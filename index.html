<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡皮巴拉自动化</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="status-log" id="status-log">初始化加载中...</div>
    <input type="file" id="image-loader" accept="image/*" multiple onchange="handleImageUpload(event)">
    <div class="debug-box" id="debug-box"><canvas id="canvas-normalized"></canvas></div>

    <script>
        // 1. 预定义核心变量
        let cvReady = false;

        // 2. 日志系统（确保即使 logger 还没生成也能缓存信息）
        function log(msg) {
            console.log(msg);
            const logger = document.getElementById('status-log');
            if (logger) {
                logger.innerText += "\n> " + msg;
                logger.scrollTop = logger.scrollHeight;
            }
        }

        // 3. 核心加载检测
        function onOpenCvReady() {
            cvReady = true;
            log("✅ OpenCV 算力内核已就绪");
        }

        // 4. 你的 handleImageUpload 函数（放入刚才的强制检查逻辑）
        async function handleImageUpload(event) {
            if (!cvReady) {
                log("⏳ 内核正在热启动，请等待...");
                await new Promise(r => setTimeout(r, 1000));
            }
            if (!cvReady) {
                log("❌ 初始化超时，请检查 CDN 链接是否被拦截。");
                return;
            }
            
            // 下面放入你原本的完整图像处理逻辑...
            log("开始处理图像...");
            // (此处保持你原本的图像处理代码)
        }
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/opencv.js/4.8.0/opencv.js" onload="onOpenCvReady();"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</body>
</html>
